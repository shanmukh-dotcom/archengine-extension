<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoDev Architecture Review</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f111a;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.1);
      --accent: #00e5ff;
      --accent-glow: rgba(0, 229, 255, 0.3);
      --text-main: #f0f0f0;
      --text-muted: #8892b0;
    }

    body {
      margin: 0;
      padding: 30px;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    h1, h2, h3 {
      font-weight: 600;
      margin: 0 0 15px 0;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 32px;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--card-border);
    }

    .stat-label { color: var(--text-muted); }
    .stat-value { font-weight: 500; color: var(--accent); }

    .file-tree {
      list-style-type: none;
      padding: 0;
      margin: 0;
      max-height: 400px;
      overflow-y: auto;
    }

    .file-item {
      padding: 12px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.2);
      margin-bottom: 8px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .file-item:hover {
      border-color: var(--accent);
      background: rgba(0, 229, 255, 0.05);
    }

    .file-path {
      font-family: monospace;
      font-size: 14px;
      color: #fff;
      margin-bottom: 4px;
    }

    .file-reason {
      font-size: 12px;
      color: var(--text-muted);
    }

    .actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 40px;
    }

    button {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button.primary {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    button.primary:hover {
      box-shadow: 0 0 25px var(--accent-glow);
      transform: translateY(-2px);
    }

    button.secondary:hover {
      background: rgba(0, 229, 255, 0.1);
    }
  </style>
</head>
<body>
  <!-- INJECT_BLUEPRINT -->

  <div class="header">
    <h1>Architecture Blueprint</h1>
    <p style="color: var(--text-muted);">Review your generated project skeleton before writing to disk.</p>
  </div>

  <div class="grid">
    <div class="glass-card">
      <h2>Project Intent</h2>
      <div id="intent-stats"></div>
      
      <h3 style="margin-top: 24px;">Dependencies</h3>
      <div id="dependencies-list" style="color: var(--text-muted); font-size: 14px;"></div>
    </div>

    <div class="glass-card">
      <h2>Generated Files</h2>
      <ul class="file-tree" id="file-list"></ul>
    </div>
  </div>

  <div class="actions">
    <button class="secondary" onclick="cancel()">Cancel</button>
    <button class="primary" onclick="approve()">Approve & Generate Workspace</button>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    const blueprint = window.initialBlueprint;

    if (blueprint) {
      // Render Intent
      const intentDiv = document.getElementById('intent-stats');
      intentDiv.innerHTML = `
        <div class="stat-row"><span class="stat-label">Type</span><span class="stat-value">${blueprint.intent.projectType}</span></div>
        <div class="stat-row"><span class="stat-label">Framework</span><span class="stat-value">${blueprint.intent.framework}</span></div>
        <div class="stat-row"><span class="stat-label">Database</span><span class="stat-value">${blueprint.intent.database || 'None'}</span></div>
        <div class="stat-row"><span class="stat-label">Features</span><span class="stat-value">${blueprint.intent.features.join(', ') || 'None'}</span></div>
        <div class="stat-row"><span class="stat-label">Confidence</span><span class="stat-value">${blueprint.confidenceScore}%</span></div>
      `;

      // Render Dependencies
      document.getElementById('dependencies-list').innerText = blueprint.dependencies.join(', ') || 'No external dependencies';

      // Render Files
      const fileList = document.getElementById('file-list');
      fileList.innerHTML = blueprint.files.map(f => `
        <li class="file-item">
          <div class="file-path">${f.path}</div>
          <div class="file-reason">Reasoning: ${f.reason}</div>
        </li>
      `).join('');
    }

    function approve() {
      vscode.postMessage({ command: 'approve' });
    }

    function cancel() {
      vscode.postMessage({ command: 'cancel' });
    }
  </script>
</body>
</html>
